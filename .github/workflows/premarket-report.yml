name: Premarket Analysis Report

on:
  schedule:
    # 00:00 UTC = 08:00 Beijing time (Mon-Fri)
    - cron: '0 0 * * 1-5'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run even on non-trading days'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  premarket-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: stock_agents

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: stock_agents/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r stock_agents/requirements.txt

      - name: Run premarket analysis
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python -m stock_agents report-and-notify $FORCE_FLAG

      - name: Commit reports
        continue-on-error: true
        working-directory: stock_agents
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f reports/
          if git diff --cached --quiet; then
            echo "No new reports to commit"
          else
            DATE=$(date -u +"%Y-%m-%d")
            git commit -m "📊 Premarket report ${DATE}" \
              -m "Auto-generated by GitHub Actions premarket workflow"
            git push
          fi

      - name: Upload reports as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: premarket-reports-${{ github.run_number }}
          path: stock_agents/reports/
          retention-days: 30
