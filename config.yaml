llm:
  provider: "azure_openai"           # anthropic / github_models / azure_openai / ollama / openrouter
  model: "gpt-54"
  model_final: "gpt-54"
  max_tokens: 4096                   # GPT-5.4 is slow with large outputs — cap at 4k
  temperature: 0.3
  api_key_env: "AZURE_OPENAI_API_KEY"
  endpoint: "https://davinci-dev-openai-api.corp.hpicloud.net/genaiquality"
  azure_api_version: "2025-01-01-preview"
  azure_deployment: "gpt-54"
  fallback: "ollama"              # ollama / none — auto-fallback when primary fails

openrouter:
  model: "openai/gpt-oss-120b:free"
  api_key_env: "OPENROUTER_API_KEY"
  endpoint: "https://openrouter.ai/api/v1"
  max_tokens: 128000
  temperature: 0.3

ollama:
  model: "gemma4"              # best local model for financial analysis
  endpoint: "http://localhost:11434/v1"
  max_tokens: 128000
  temperature: 0.3

watchlist:
  - "600711"  # 盛屯矿业
  - "601012"  # 隆基绿能
  - "603993"  # 洛阳钼业

analysis:
  lookback_days: 250
  financial_quarters: 8
  news_count: 20

risk:
  max_single_position_pct: 0.25
  max_sector_pct: 0.40
  max_drawdown_pct: 0.15
  total_capital: 75103      # auto-calculated from portfolio.csv

cache:
  enabled: true
  ttl_seconds: 900
  directory: ".cache"

compliance:
  log_directory: "logs"

output:
  format: "markdown"
  save_to_file: true
  output_directory: "reports"
