llm:
  provider: "github_models"          # anthropic / github_models / azure_openai / ollama / openrouter
  model: "gpt-5.4-mini"             # default model for all agents
  model_final: "gpt-5.4"            # strongest model for fund manager final decisions
  max_tokens: 4096
  temperature: 0.3
  fallback: "ollama"                 # ollama / none — auto-fallback when primary fails
  # Per-agent model overrides (optional).
  # Agents not listed here use the default `model` above.
  # Valid keys: fundamental, technical, sentiment, bull, bear, quant, risk, fund_manager
  agent_models:
    fundamental: "gpt-5.4"
    technical: "gpt-5.4"
    sentiment: "gpt-5.4"
    bull: "gpt-5.4-mini"
    bear: "gpt-5.4-mini"
    quant: "gpt-5.4-mini"
    risk: "gpt-5.4-mini"
    fund_manager: "gpt-5.4"          # strongest model for final decisions

openrouter:
  model: "openai/gpt-oss-120b:free"
  api_key_env: "OPENROUTER_API_KEY"
  endpoint: "https://openrouter.ai/api/v1"
  max_tokens: 128000
  temperature: 0.3

ollama:
  model: "gemma4"              # best local model for financial analysis
  endpoint: "http://localhost:11434/v1"
  max_tokens: 128000
  temperature: 0.3

watchlist:
  - "600711"  # 盛屯矿业
  - "601012"  # 隆基绿能
  - "603993"  # 洛阳钼业
  # - "000762"  # 西藏矿业
  - "002240"  # 盛新锂能
  # - "001203"  # 大中矿业

analysis:
  lookback_days: 250
  financial_quarters: 8
  news_count: 20

risk:
  max_single_position_pct: 0.25
  max_sector_pct: 0.40
  max_drawdown_pct: 0.15
  total_capital: 75103      # auto-calculated from portfolio.csv

cache:
  enabled: true
  ttl_seconds: 900
  directory: ".cache"

compliance:
  log_directory: "logs"

output:
  format: "markdown"
  save_to_file: true
  output_directory: "reports"

